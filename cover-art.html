<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cover Art — GC Collective</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #0a0a0a;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(22,42,20,0.75) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 50% 100%, rgba(40,28,4,0.55) 0%, transparent 70%);
    color: #e8e8e8;
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  .page-wrap {
    max-width: 680px;
    margin: 0 auto;
  }
  .logo-wrap {
    text-align: center;
    padding: 24px 0 8px;
  }
  .logo-wrap img {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: block;
    margin: 0 auto;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #c9a84c;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.05em;
    -webkit-transition: opacity 0.2s; transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }
  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #999;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 12px;
    padding: 28px 24px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  label:first-of-type { margin-top: 0; }
  input[type=text], input[type=email], input[type=tel],
  input[type=date], input[type=datetime-local], select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    -webkit-appearance: none;
    -webkit-transition: border-color 0.2s; transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    border-color: rgba(201,168,76,0.5);
  }
  select option { background: #1a1a1a; }
  textarea { resize: vertical; min-height: 90px; }
  .hint {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }
  .price-note {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: #c9a84c;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .submit-btn {
    display: block;
    width: 100%;
    background: #c9a84c;
    color: #0a0a0a;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 28px;
    -webkit-transition: opacity 0.2s; transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.85; }
  .success-msg {
    display: none;
    text-align: center;
    color: #c9a84c;
    padding: 20px;
    font-size: 15px;
    line-height: 1.6;
  }
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #555;
    margin-top: 40px;
  }

</style>
</head>
